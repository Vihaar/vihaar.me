kind = "web"
previewPath = "/"
title = "vihaar.me"
version = "1.0.0"
id = "artifacts/vihaar-me"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25901
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vihaar-me run dev"

[services.env]
PORT = "25901"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vihaar-me", "run", "build"]
publicDir = "artifacts/vihaar-me/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
