    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-kitchen.png"
    description: "High-end Michelin star kitchen atmosphere, deep burgundy and cream colors, candlelight gold accents, painterly"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-tedx.png"
    description: "A dark stage with a warm dramatic red spotlight hitting a red circular carpet, stylized illustration"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-acting.png"
    description: "Vintage Hollywood film reel aesthetic, golden cinematic warmth, sepia tones, illustrated storybook style"
