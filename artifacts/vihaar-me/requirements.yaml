    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/heart.png"
    description: "Beautiful hand-drawn illustration of a warm glowing anatomical human heart, stylized, red and gold tones, childlike wonder, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/vihaar-me/public/images/bg-family.png"
    description: "Warm cozy lake house in Michigan suburbs at sunset, nostalgic, hand-painted Studio Ghibli style, deep warm reds and earth browns"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-skiing.png"
    description: "Snowy mountain peak, icy blue and white, gentle snow, watercolor style, cinematic and playful"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-boxing.png"
    description: "Dark moody boxing ring illuminated by a dramatic overhead light, red accents, sketched organic style"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-iceland.png"
    description: "Dark volcanic landscape, towering hexagonal basalt columns, ethereal purple and teal Northern Lights in the sky, hand-drawn"
    aspect_ratio: "16:9"
  - path: "artifacts/vihaar-me/public/images/bg-marathon.png"
