# Monorepo: site lives in artifacts/vihaar-me (Vite → dist/public)
[build]
  command = "pnpm install && pnpm --filter @workspace/vihaar-me run build"
  publish = "artifacts/vihaar-me/dist/public"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "PORT,FRONTEND_ORIGIN"
  SECRETS_SCAN_OMIT_PATHS = "artifacts/vihaar-me/public/feeding-india/map/india-regions.svg,artifacts/vihaar-me/dist/**"

# Stripe Checkout API (serverless) — must be before SPA catch-all
[[redirects]]
  from = "/api/stripe/create-donation-session"
  to = "/.netlify/functions/create-donation-session"
  status = 200
  force = true

# SPA: client-side routes (e.g. /fundraise2026) must serve index.html or direct loads 404
[[redirects]]
  from = "/Fundraise2026"
  to = "/fundraise2026"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
